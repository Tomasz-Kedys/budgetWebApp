<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dane użytkownika</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <header class="header">
    <nav class="navbar" id="navigation">
      <a href="mainPage.html">Strona główna</a>
      <a href="expense.html">Wydatek</a>
      <a href="income.html">Przychód</a>
      <a href="budgetBalance.html">Bilans</a>
      <a href="settings.html" class="active">Ustawienia</a>
      <a href="login.html">Wyloguj</a>
    </nav>
    <img id="menuToggle" class="hamburger" src="../assets/Ham.svg" alt="menu">
  </header>

  <main class="form-container">
    <h1>Dane użytkownika</h1>
    <div class="user-data">
      <div class="user-row">
        <span>Imię i nazwisko : <b id="userName">Jan Kowalski</b></span>
        <button class="add-btn small" onclick="openPopup('name')">Zmień</button>
      </div>

      <div class="user-row">
        <span>Nick : <b id="Nick">Janek</b></span>
        <button class="add-btn small" onclick="openPopup('nick')">Zmień</button>
      </div>

      <div class="user-row">
        <span>E-mail : <b id="userEmail">jan@email.com</b></span>
        <button class="add-btn small" onclick="openPopup('email')">Zmień</button>
      </div>

      <div class="user-row">
        <span>Hasło : <b>••••••••••••••••••••••</b></span>
        <button class="add-btn small" onclick="openPopup('password')">Zmień</button>
      </div>
    </div>
  </main>

  <div class="bottom-buttons">
    <a href="settings.html" class="settings">Powrót</a>
    <a href="login.html" class="logout">Wyloguj</a>
  </div>
</div>

<div id="editPopup" class="popup-overlay">

  <div class="popup-box">

    <h2 id="popupTitle"></h2>

    <input id="popupInput" type="text">

    <div class="popup-buttons">
      <button class="add-btn" onclick="saveData()">Zapisz</button>
      <button class="add-btn" id="cancel" onclick="closePopup()">Anuluj</button>
    </div>

  </div>

</div>
<script src="../Scripts.js"></script>
</body>
</html>
