<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>User Data</title>
  <link rel="stylesheet" href="../styles.css">
</head>

<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <header class="header">
    <nav class="navbar" id="navigation">
      <a href="mainPage.html">Main Page</a>
      <a href="expense.html">Expense</a>
      <a href="income.html">Income</a>
      <a href="budgetBalance.html">Balance</a>
      <a href="settings.html" class="active">Settings</a>
      <a href="login.html">Logout</a>
    </nav>
    <img id="menuToggle" class="hamburger" src="../assets/Ham.svg" alt="menu">
  </header>

  <main class="form-container">
    <h1>User Data</h1>
    <div class="user-data">
      <div class="user-row">
        <span>Name : <b id="userName">Jhon Doe</b></span>
        <button class="add-btn small" onclick="openPopup('name')">Change</button>
      </div>

      <div class="user-row">
        <span>Nick : <b id="Nick">Jhon</b></span>
        <button class="add-btn small" onclick="openPopup('nick')">Change</button>
      </div>

      <div class="user-row">
        <span>E-mail : <b id="userEmail">jhon@email.com</b></span>
        <button class="add-btn small" onclick="openPopup('email')">Change</button>
      </div>

      <div class="user-row">
        <span>Password : <b>••••••••••••••••••••••</b></span>
        <button class="add-btn small" onclick="openPopup('password')">Change</button>
      </div>
    </div>
  </main>

  <div class="bottom-buttons">
    <a href="settings.html" class="settings">Back</a>
    <a href="login.html" class="logout">Logout</a>
  </div>
</div>

<div id="editPopup" class="popup-overlay">

  <div class="popup-box">

    <h2 id="popupTitle"></h2>

    <input id="popupInput" type="text">

    <div class="popup-buttons">
      <button class="add-btn" onclick="saveData()">Save</button>
      <button class="add-btn" id="cancel" onclick="closePopup()">Cancel</button>
    </div>

  </div>

</div>
<script src="../Scripts.js"></script>
</body>
</html>
