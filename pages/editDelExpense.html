<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edycja wydatków</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <header class="header">
    <nav class="navbar" id="navigation">
      <a href="mainPage.html">Strona główna</a>
      <a href="expense.html" class="active">Wydatek</a>
      <a href="income.html">Przychód</a>
      <a href="budgetBalance.html">Bilans</a>
      <a href="settings.html">Ustawienia</a>
      <a href="login.html">Wyloguj</a>
    </nav>
    <img id="menuToggle" class="hamburger" src="../assets/Ham.svg" alt="menu">
  </header>

  <main class="form-container wide">
    <h1>Zmiana danych - Wydatki</h1>
    <button class="date-btn" id="dateBtn" style="margin-bottom:10px;">data</button>
    <div id="calendarDropdown" class="calendar-dropdown">
      <div class="calendar-header">
        <button id="prevMonth" class="calendar-nav">←</button>
        <span id="calendarMonth"></span>
        <button id="nextMonth" class="calendar-nav">→</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="calendar-actions">
          <button id="applyDateBtn" class="add-btn small">Zastosuj</button>
          <button id="closeBtn" class="add-btn small">Close</button>
        </div>
    </div>
    <table class="edit-table">
      <thead>
        <tr>
          <th>Wartość</th>
          <th>Kategoria</th>
          <th>Sposób płatności</th>
          <th>Edycja</th>
          <th>Usuń</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td><button class="add-btn">Zapisz</button></td>
          <td><button class="logout small">X</button></td>
        </tr>
      </tbody>
    </table>
  </main>

  <div class="bottom-buttons">
    <a href="budgetBalance.html" class="settings">Go back</a>
    <a href="login.html" class="logout">Wyloguj</a>
  </div>
</div>
<script src="../Scripts.js"></script>
</body>
</html>
