<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Edit Expense</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>
<div class="overlay" id="overlay"></div>
<div class="container">
  <header class="header">
    <nav class="navbar" id="navigation">
      <a href="../index.html">Main Page</a>
      <a href="expense.html">Expense</a>
      <a href="income.html">Income</a>
      <a href="budgetBalance.html">Balance</a>
      <a href="settings.html" class="active">Settings</a>
      <a href="login.html">Logout</a>
    </nav>
    <img id="menuToggle" class="hamburger" src="../assets/Ham.svg" alt="menu">
  </header>

  <main class="form-container wide">
    <h1>Data Change - Expenses</h1>
    <button class="date-btn" id="dateBtn" style="margin-bottom:10px;">Date</button>
    <div id="calendarDropdown" class="calendar-dropdown">
      <div class="calendar-header">
        <button id="prevMonth" class="calendar-nav">←</button>
        <span id="calendarMonth"></span>
        <button id="nextMonth" class="calendar-nav">→</button>
      </div>
      <div id="calendarGrid" class="calendar-grid"></div>
      <div class="calendar-actions">
          <button id="applyDateBtn" class="add-btn small">Save</button>
          <button id="closeBtn" class="add-btn small">Close</button>
        </div>
    </div>
    <table class="edit-table">
      <thead>
        <tr>
          <th>Amount</th>
          <th>Category</th>
          <th>Payment Method</th>
          <th>Edit</th>
          <th>Delete</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td></td>
          <td></td>
          <td></td>
          <td><button class="add-btn">Save</button></td>
          <td><button class="add-btn">X</button></td>
        </tr>
      </tbody>
    </table>
  </main>

  <div class="bottom-buttons">
    <a href="budgetBalance.html" class="settings">Back</a>
    <a href="login.html" class="logout">Logout</a>
  </div>
</div>
<script src="../Scripts.js"></script>
</body>
</html>
