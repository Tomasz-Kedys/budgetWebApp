<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Balance</title>
  <link rel="stylesheet" href="../styles.css">
</head>
<body>

<div class="overlay" id="overlay"></div>
<div class="container">
  <header class="header">
    <nav class="navbar" id="navigation">
      <a href="mainPage.html">Main Page</a>
      <a href="expense.html">Expense</a>
      <a href="income.html">Income</a>
      <a href="budgetBalance.html">Balance</a>
      <a href="settings.html" class="active">Settings</a>
      <a href="login.html">Logout</a>
    </nav>
    <img id="menuToggle" class="hamburger" src="../assets/Ham.svg" alt="menu">
  </header>

  <main class="form-container">
      <h1>Balance</h1>
      <select id="dateSelect" class="date-select">
        <option value="currentMonth">Current Month</option>
        <option value="previousMonth">Previous Month</option>
        <option value="currentYear">Current Year</option>
        <option value="custom">Custom</option>
      </select>
      <div class="calendar-dropdown" id="calendarDropdown">
        <div class="calendar-header">
          <button id="prevMonth" class="calendar-nav">←</button>
          <span id="calendarMonth"></span>
          <button id="nextMonth" class="calendar-nav">→</button>
        </div>
        <div class="calendar-grid" id="calendarGrid"></div>
        <div class="calendar-actions">
          <button id="applyDateBtn" class="add-btn small">Save</button>
          <button id="closeBtn" class="add-btn small">Close</button>
        </div>
      </div>

      <div class="tables">
        <table class="balance-table">
          <tr><th>Date</th><th>Category</th><th>Amount</th></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
        </table>
        <table class="balance-table">
          <tr><th>Date</th><th>Category</th><th>Amount</th></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
          <tr><td></td><td></td><td></td></tr>
        </table>
      </div>

      <div class="range-bar">Balnce from selected period ...</div>

      <div class="charts">
        <div class="bar-chart">📊 Bar chart</div>
        <div class="donut-chart">🟢 Pie chart</div>
      </div>

      <div class="actions">
        <a class="add-btn" href="editDelExpense.html">Edit Expenses</a>
        <a class="add-btn" href="editDelIncome.html">Edit Income</a>
      </div>
  </main>

  <div class="bottom-buttons">
    <a href="settings.html" class="settings">Settings</a>
    <a href="login.html" class="logout">Logout</a>
  </div>
</div>

<script src="../Scripts.js"></script>
</body>
</html>
